name: Price Monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger from the Actions tab

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      actions: write           # required to save cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Restore the alert-state file from the previous run.
      # Using run_id in the key ensures a new entry is always written;
      # restore-keys picks up the most recent existing entry.
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: price-monitor-state-${{ github.run_id }}
          restore-keys: price-monitor-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python price_monitor.py

      # Always save state so the cooldown persists across runs
      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: price-monitor-state-${{ github.run_id }}
